#               max: 1000
#           - name: v
#             bytes: 2
#             range:
#               min: 0
#               max: 1000

  # Optional: expose DP36 so you can paste custom scene payloads (base64)
  - entity: text
    name: Mix light scene (DP36)
    category: config
    dps:
      - id: 36
        type: base64
        name: value

  - entity: select
    translation_key: scene
    category: config
    dps:
      - id: 51
        type: string
        name: Mix light scene (DP36) Presets
        optional: true
        mapping:
          - dps_val: "AMoAAAECA11dAQAAA+gD6F1dAQAAA+gACg=="
            value: "Red Alert"
          - dps_val: "AMsAAAEBAyUlAAB3A+gD6A=="
            value: "Green Alert"
  # Optional: expose DP51 too (base64) for advanced combined RGB/CW experiments
  - entity: text
    name: Mix RGBCW (DP51)
    category: config
    dps:
      - id: 51
        type: base64
        name: value

  - entity: select
    translation_key: scene
    category: config
    dps:
      - id: 51
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "AAUA7APoA+gBLwEV"
            value: "Default - WW 30%"
            default: true
          - dps_val: "AAUA7APoA+gD6AAA"
            value: "WW 100%"
          - dps_val: "AAUA7APoA+gB9AAA"
            value: "WW 50%"
          - dps_val: "AAUA7APoA+gACgAA"
            value: "WW 1%"
          - dps_val: "AAUA7APoA+gD6gHg"
            value: "WN 100%"
          - dps_val: "AAUA7APoA+gB9gHg"
            value: "WN 50%"
          - dps_val: "AAUA7APoA+gACgHg"
            value: "WN 1%"
          - dps_val: "AAUA7APoA+gD6AAA"
            value: "RGB RED 100%"
          - dps_val: "AAYAAAPoA+gB9AAA"
            value: "RGB RED 50%"
          - dps_val: "AAYAAAPoAAoACgAA"
            value: "RGB RED 1%"
          - dps_val: "AAcAAAPoAAoACgAA"
            value: "WW+RED 100%"
          - dps_val: "AAcAAAPoAfMB8QAA"
            value: "WW+RED 50%"
          - dps_val: "AAcAAAPoA+gD6AAA"
            value: "WW+RED 1%"
