name: RGB+CCT LED Panel Light
products:
  - id: rc3ahhngdmciuhn9
    model: SHA5356

entities:
  - entity: light
    name: Panel
    dps:
      - id: 20
        type: boolean
        name: switch

#       - id: 21
#         type: string
#         name: color_mode
#         mapping:
#           - dps_val: white
#             value: color_temp
#           - dps_val: colour
#             value: hs
#           # Treat these as "effects" via color_mode (Tuya Local supports that)
#           - dps_val: scene
#             value: Scene
#           - dps_val: music
#             value: Music
#
#       - id: 22
#         type: integer
#         name: brightness
#         range:
#           min: 10
#           max: 1000
#
#       - id: 23
#         type: integer
